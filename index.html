<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Settings -->
    <title>SelfTrack PRO</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1c1917" />
    
    <!-- iOS Native App PWA Settings -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SelfTrack" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Custom styling to prevent rubber-banding of viewport scroll on safari mobile if desired -->
    <style>
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #fafaf9;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Safe update flow: when a new worker has installed and there is
            // already a controller, activate it immediately and reload once so
            // the user always lands on a coherent, fully-updated app shell.
            function promote(worker) {
              if (!worker) return;
              worker.addEventListener('statechange', () => {
                if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            }
            if (reg.waiting && navigator.serviceWorker.controller) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            reg.addEventListener('updatefound', () => promote(reg.installing));
          }).catch((err) => console.warn('ServiceWorker registration failed', err));

          // Reload exactly once when the new worker takes control.
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>

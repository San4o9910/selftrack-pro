name: Build IPA for SideStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app and sync Capacitor
        run: |
          npm run build
          npx cap sync ios

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "Секреты подписи не заданы — пробуем сборку без экспорта IPA."
            exit 0
          fi
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Archive iOS app
        working-directory: ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $GITHUB_WORKSPACE/build/SelfTrack.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}" \
            -allowProvisioningUpdates

      - name: Export IPA
        if: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/SelfTrack.xcarchive \
            -exportPath $GITHUB_WORKSPACE/build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates
          mv $GITHUB_WORKSPACE/build/ipa/App.ipa $GITHUB_WORKSPACE/build/SelfTrack.ipa

      - name: Upload IPA artifact
        if: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: SelfTrack-SideStore
          path: build/SelfTrack.ipa
